services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2662001
      POSTGRES_DB: tradebot
    ports:
      # Host 5433 to avoid colliding with the local PostgreSQL 18 service on 5432; container stays 5432.
      - '5433:5432'
    volumes:
      - tradebot_pg:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      # Host 6380 to avoid colliding with other local Redis instances; container stays 6379.
      - '6380:6379'

volumes:
  tradebot_pg:
